<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; }
  input:focus { outline: none; }
  button:active { opacity: 0.8; }
  button:disabled { cursor: default; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// =============================================
// FUNÇÕES QUE FALAM COM O BANCO (via main.py)
// =============================================
async function buscarProdutos() {
  const r = await fetch('/produtos');
  if (!r.ok) throw new Error("Falha ao buscar produtos");
  return r.json();
}

async function salvarNoBanco(id, quantidade) {
  await fetch(`/produtos/${id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ quantidade })
  });
}

async function criarNoBanco(produto) {
  const r = await fetch('/produtos', {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(produto)
  });
  return r.json();
}

async function enviarListaCompras() {
  const r = await fetch('/lista-compras', {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({})
  });
  return r.json();
}

// =============================================
// COMPONENTES VISUAIS
// =============================================
function badge(bg, color) {
  return { background:bg, color, fontSize:10, fontWeight:700,
    padding:"3px 8px", borderRadius:20, letterSpacing:0.5,
    textTransform:"uppercase", whiteSpace:"nowrap" };
}

function StatusBadge({ p }) {
  const pct = p.quantidade / p.minimo;
  if (p.quantidade === 0) return <span style={badge("#FF3B30","#fff")}>ZERADO</span>;
  if (pct <= 1)           return <span style={badge("#FF9500","#fff")}>ABAIXO DO MÍNIMO</span>;
  if (pct <= 1.5)         return <span style={badge("#FFD60A","#1a1a1a")}>ATENÇÃO</span>;
  return                         <span style={badge("#34C759","#fff")}>OK</span>;
}

function Barra({ p }) {
  const pct = Math.min((p.quantidade / (p.minimo * 2)) * 100, 100);
  const cor = p.quantidade === 0 ? "#FF3B30"
    : p.quantidade <= p.minimo ? "#FF9500"
    : p.quantidade <= p.minimo * 1.5 ? "#FFD60A" : "#34C759";
  return (
    <div style={{ background:"#2a2a2a", borderRadius:4, height:5, margin:"10px 0 4px" }}>
      <div style={{ width:pct+"%", height:"100%", borderRadius:4, background:cor, transition:"width 0.4s" }} />
    </div>
  );
}

function TelaCarregando() {
  return (
    <div style={{ minHeight:"100vh", background:"#111", color:"#888",
      display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"'Segoe UI',sans-serif", fontSize:14 }}>
      Carregando estoque...
    </div>
  );
}

function TelaErro() {
  return (
    <div style={{ minHeight:"100vh", background:"#111", color:"#FF3B30",
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      fontFamily:"'Segoe UI',sans-serif", gap:14, padding:20, textAlign:"center" }}>
      <div style={{ fontSize:14 }}>❌ Não foi possível carregar os produtos.</div>
      <button onClick={() => window.location.reload()}
        style={{ background:"#FF3B30", color:"#fff", border:"none",
          borderRadius:8, padding:"10px 22px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
        Tentar novamente
      </button>
    </div>
  );
}

// =============================================
// APP PRINCIPAL
// =============================================
function App() {
  const [produtos, setProdutos]       = useState([]);
  const [carregando, setCarregando]   = useState(true);
  const [erro, setErro]               = useState(false);
  const [editando, setEditando]       = useState(null);
  const [novoValor, setNovoValor]     = useState("");
  const [salvandoId, setSalvandoId]   = useState(null);
  const [adicionando, setAdicionando] = useState(false);
  const [salvandoNovo, setSalvandoNovo] = useState(false);
  const [novo, setNovo]               = useState({ nome:"", quantidade:"", minimo:"", unidade:"kg", categoria:"" });
  const [enviandoLista, setEnviandoLista] = useState(false);
  const [ultimoEnvio, setUltimoEnvio] = useState(null);

  // Busca os produtos do banco quando a tela abre
  useEffect(() => {
    buscarProdutos()
      .then(data => { setProdutos(data); setCarregando(false); })
      .catch(() => { setErro(true); setCarregando(false); });
  }, []);

  const emAlerta = produtos.filter(p => p.quantidade <= p.minimo);
  const zerados  = produtos.filter(p => p.quantidade === 0);

  // Atualiza a tela na hora E salva no banco em segundo plano
  async function salvar(id) {
    const val = parseFloat(novoValor);
    if (isNaN(val) || val < 0) return;

    setEditando(null);
    setNovoValor("");
    setSalvandoId(id);

    setProdutos(prev => prev.map(p => p.id === id ? { ...p, quantidade: val } : p));

    try {
      await salvarNoBanco(id, val);
    } catch (e) {
      console.error("Erro ao salvar no banco:", e);
    }
    setSalvandoId(null);
  }

  // Cria o produto no banco e só então adiciona na tela
  async function adicionarProduto() {
    if (!novo.nome || novo.quantidade === "" || novo.minimo === "") return;

    setSalvandoNovo(true);
    try {
      const criado = await criarNoBanco({
        nome: novo.nome,
        quantidade: parseFloat(novo.quantidade),
        minimo: parseFloat(novo.minimo),
        unidade: novo.unidade || "un",
        categoria: novo.categoria || "Geral"
      });
      setProdutos(prev => [...prev, criado]);
      setNovo({ nome:"", quantidade:"", minimo:"", unidade:"kg", categoria:"" });
      setAdicionando(false);
    } catch (e) {
      console.error("Erro ao criar produto:", e);
    }
    setSalvandoNovo(false);
  }

  async function handleEnviarLista() {
    if (emAlerta.length === 0 || enviandoLista) return;
    setEnviandoLista(true);
    const data = await enviarListaCompras();
    setUltimoEnvio({
      hora: new Date().toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit" }),
      sucesso: data.ok
    });
    setEnviandoLista(false);
  }

  if (carregando) return <TelaCarregando />;
  if (erro) return <TelaErro />;

  return (
    <div style={{ minHeight:"100vh", background:"#111", color:"#f0f0f0",
      fontFamily:"'Segoe UI',sans-serif",
      paddingBottom: emAlerta.length > 0 ? 110 : 30 }}>

      {/* HEADER */}
      <div style={{ background:"linear-gradient(135deg,#1a1a1a,#222)", borderBottom:"1px solid #2a2a2a", padding:"20px 16px 16px" }}>
        <div style={{ maxWidth:600, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:11, color:"#666", letterSpacing:2, textTransform:"uppercase", marginBottom:4 }}>Restaurante</div>
              <div style={{ fontSize:22, fontWeight:700 }}>Controle de Estoque</div>
            </div>
            {emAlerta.length > 0 && (
              <div style={{ background:"#FF3B30", color:"#fff", borderRadius:20, padding:"6px 14px", fontSize:13, fontWeight:700 }}>
                {emAlerta.length} alerta{emAlerta.length > 1 ? "s" : ""}
              </div>
            )}
          </div>

          <div style={{ display:"flex", gap:10, marginTop:16 }}>
            {[
              { label:"Produtos",  val:produtos.length, cor:"#888" },
              { label:"Em alerta", val:emAlerta.length, cor:emAlerta.length > 0 ? "#FF9500" : "#34C759" },
              { label:"Zerados",   val:zerados.length,  cor:"#FF3B30" },
            ].map(c => (
              <div key={c.label} style={{ flex:1, background:"#1e1e1e", borderRadius:10, padding:"10px 14px", border:"1px solid #2a2a2a" }}>
                <div style={{ fontSize:20, fontWeight:800, color:c.cor }}>{c.val}</div>
                <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{c.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:600, margin:"0 auto", padding:"0 16px" }}>

        {/* LISTA DE REPOSIÇÃO */}
        {emAlerta.length > 0 ? (
          <div style={{ marginTop:20 }}>
            <div style={{ fontSize:11, color:"#666", letterSpacing:2, textTransform:"uppercase", marginBottom:10 }}>
              Lista de Reposição ({emAlerta.length})
            </div>
            <div style={{ background:"#1e1310", border:"1px solid #3a2010", borderRadius:12, padding:"4px 16px" }}>
              {emAlerta.map((p, i) => (
                <div key={p.id} style={{
                  display:"flex", justifyContent:"space-between", alignItems:"center",
                  padding:"10px 0",
                  borderBottom: i < emAlerta.length - 1 ? "1px solid #2a1810" : "none"
                }}>
                  <span style={{ fontSize:13, fontWeight:600 }}>📦 {p.nome}</span>
                  <span style={{ fontSize:12, color:"#aaa" }}>
                    {p.quantidade}{p.unidade}
                    <span style={{ color:"#666" }}> (mín {p.minimo}{p.unidade})</span>
                  </span>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div style={{ marginTop:20, background:"#0d1f1a", border:"1px solid #1a3d2a",
            borderRadius:12, padding:16, textAlign:"center", color:"#34C759", fontSize:13 }}>
            ✅ Tudo em dia! Nenhum produto precisa de reposição.
          </div>
        )}

        {/* PRODUTOS */}
        <div style={{ marginTop:20 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:11, color:"#666", letterSpacing:2, textTransform:"uppercase" }}>Produtos</div>
            <button onClick={() => setAdicionando(true)}
              style={{ background:"#1e3a2a", border:"1px solid #2d5a3d", color:"#34C759",
                borderRadius:8, padding:"6px 14px", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              + Adicionar
            </button>
          </div>

          {adicionando && (
            <div style={{ background:"#1a1a1a", border:"1px solid #333", borderRadius:12, padding:16, marginBottom:12 }}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:12, color:"#34C759" }}>Novo produto</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {[
                  { key:"nome",       placeholder:"Nome do produto",        span:2 },
                  { key:"categoria",  placeholder:"Categoria (ex: Carnes)", span:2 },
                  { key:"quantidade", placeholder:"Qtd atual",  type:"number" },
                  { key:"minimo",     placeholder:"Qtd mínima", type:"number" },
                  { key:"unidade",    placeholder:"Unidade (kg, L, un...)" },
                ].map(f => (
                  <input key={f.key} type={f.type||"text"} placeholder={f.placeholder}
                    value={novo[f.key]}
                    onChange={e => setNovo(prev => ({...prev,[f.key]:e.target.value}))}
                    style={{ gridColumn:f.span===2?"1 / -1":"auto",
                      background:"#222", border:"1px solid #333", color:"#fff",
                      borderRadius:8, padding:"8px 12px", fontSize:13 }} />
                ))}
              </div>
              <div style={{ display:"flex", gap:8, marginTop:12 }}>
                <button onClick={adicionarProduto} disabled={salvandoNovo}
                  style={{ background: salvandoNovo ? "#1a4d33" : "#34C759",
                    color: salvandoNovo ? "#7ab896" : "#000", border:"none",
                    borderRadius:8, padding:"8px 18px", fontSize:13, fontWeight:700,
                    cursor: salvandoNovo ? "default" : "pointer", flex:1 }}>
                  {salvandoNovo ? "Salvando..." : "Salvar"}
                </button>
                <button onClick={() => setAdicionando(false)} disabled={salvandoNovo}
                  style={{ background:"#222", color:"#888", border:"1px solid #333",
                    borderRadius:8, padding:"8px 18px", fontSize:13, cursor:"pointer" }}>
                  Cancelar
                </button>
              </div>
            </div>
          )}

          {produtos.map(p => (
            <div key={p.id} style={{
              background: p.quantidade <= p.minimo ? "#1a1510" : "#1a1a1a",
              border: "1px solid " + (p.quantidade===0 ? "#3a1010" : p.quantidade<=p.minimo ? "#3a2a10" : "#2a2a2a"),
              borderRadius:12, padding:16, marginBottom:10, transition:"all 0.3s" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                    <span style={{ fontWeight:700, fontSize:15 }}>{p.nome}</span>
                    <StatusBadge p={p} />
                  </div>
                  <div style={{ fontSize:11, color:"#555", marginTop:3 }}>{p.categoria}</div>
                </div>

                {editando === p.id ? (
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <input type="number" value={novoValor}
                      onChange={e => setNovoValor(e.target.value)} autoFocus
                      onKeyDown={e => { if(e.key==="Enter") salvar(p.id); if(e.key==="Escape") setEditando(null); }}
                      style={{ width:70, background:"#222", border:"1px solid #555", color:"#fff",
                        borderRadius:8, padding:"4px 8px", fontSize:16, textAlign:"center" }} />
                    <button onClick={() => salvar(p.id)}
                      style={{ background:"#34C759", color:"#000", border:"none",
                        borderRadius:6, padding:"4px 10px", fontSize:13, fontWeight:700, cursor:"pointer" }}>✓</button>
                  </div>
                ) : (
                  <div onClick={() => { if(salvandoId !== p.id) { setEditando(p.id); setNovoValor(String(p.quantidade)); } }}
                    style={{ cursor: salvandoId === p.id ? "default" : "pointer", textAlign:"right" }}>
                    <div style={{ fontSize:22, fontWeight:800 }}>
                      {p.quantidade}
                      <span style={{ fontSize:13, fontWeight:400, color:"#555", marginLeft:4 }}>{p.unidade}</span>
                    </div>
                    <div style={{ fontSize:11, color: salvandoId === p.id ? "#34C759" : "#444" }}>
                      {salvandoId === p.id ? "salvando..." : "toque para editar"}
                    </div>
                  </div>
                )}
              </div>
              <Barra p={p} />
              <div style={{ fontSize:11, color:"#444" }}>Mínimo: {p.minimo} {p.unidade}</div>
            </div>
          ))}
        </div>
      </div>

      {/* BOTÃO FIXO: ENVIAR LISTA DE COMPRAS */}
      {emAlerta.length > 0 && (
        <div style={{
          position:"fixed", bottom:0, left:0, right:0,
          background:"#1a1a1a", borderTop:"1px solid #2a2a2a",
          padding:"12px 16px", zIndex:100
        }}>
          <div style={{ maxWidth:600, margin:"0 auto" }}>
            <button onClick={handleEnviarLista} disabled={enviandoLista}
              style={{
                width:"100%",
                background: enviandoLista ? "#1a4d33" : "#25D366",
                color: enviandoLista ? "#7ab896" : "#0a0a0a",
                border:"none", borderRadius:10, padding:"14px",
                fontSize:14, fontWeight:700, cursor: enviandoLista ? "default" : "pointer"
              }}>
              {enviandoLista ? "Enviando..." : `📲 Enviar Lista de Compras (${emAlerta.length})`}
            </button>
            {ultimoEnvio && (
              <div style={{
                marginTop:6, fontSize:11, textAlign:"center",
                color: ultimoEnvio.sucesso ? "#25D366" : "#FF3B30"
              }}>
                {ultimoEnvio.sucesso
                  ? `✅ Lista enviada às ${ultimoEnvio.hora}`
                  : `❌ Erro ao enviar (${ultimoEnvio.hora}) — tente de novo`}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
